name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Import smoke check
        run: |
          python -c "import xuse, xuse.orchestrator, xuse.features.publisher.composer; print('import smoke ok')"

      - name: Gitignore invariants (secrets stay untracked, presets stay tracked)
        run: |
          git check-ignore -q config/accounts.json
          git check-ignore -q config/anything_cookies.json
          ! git check-ignore -q data/cookies/dummy_cookies_example.json
          git ls-files presets/ | grep -q 'presets/accounts/growth.json'
          git ls-files config/ | grep -q 'config/accounts.example.json'
          ! git ls-files config/ | grep -qx 'config/accounts.json'

      - name: Run tests
        run: pytest -q
